<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Simarpreet Singh | Photographer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  background:#000;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
}
nav a{color:#fff;text-decoration:none;margin-left:14px}

/* HEADER */
header{text-align:center;padding:60px 16px}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:12px;
  background:#111;
}
.filters button{
  border:1px solid #444;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
  background:none;
}
.filters button.active{
  background:#fff;
  color:#000;
}

/* SECTIONS */
section{padding:40px 16px}
.section-title{font-size:22px}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:16px;
}

.photo{
  position:relative;
  overflow:hidden;
}

.photo img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:10px;

  opacity:0;
  transform:scale(0.95);
  transition:all 0.6s ease;
}

.photo img.show{
  opacity:1;
  transform:scale(1);
}

.photo:hover img{
  transform:scale(1.05);
}

.photo::after{
  content:"© Simarpreet Singh";
  position:absolute;
  bottom:6px;
  right:6px;
  font-size:10px;
  background:rgba(0,0,0,.5);
  padding:3px 6px;
  border-radius:4px;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
  transform:scale(0.8);
  transition:0.3s;
}

#lightbox.show img{
  transform:scale(1);
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* RESPONSIVE */
@media(min-width:700px){
  .gallery{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1000px){
  .gallery{grid-template-columns:repeat(4,1fr)}
}
</style>

</head>

<body>

<nav>
<strong>Simarpreet Singh</strong>
</nav>

<header>
<h1>Photography Portfolio</h1>
</header>

<div class="filters">
<button onclick="showAll()" class="active">All</button>
<button onclick="showOnly('concerts')">Concerts</button>
<button onclick="showOnly('dance')">Dance</button>
<button onclick="showOnly('dj')">DJ</button>
<button onclick="showOnly('photoshoot')">Photoshoot</button>
<button onclick="showOnly('music')">Music</button>
<button onclick="showOnly('sports')">Sports</button>
</div>

<section id="portfolio">

<!-- CONCERTS -->

<div id="concerts" class="category-section">
<h2 class="section-title">Concert Photography</h2>
<div class="gallery">
<div class="photo"><img src="Concerts/simar(1).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/simar(3).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/simar(4).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/simar(6).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/simar(7).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/simar(8).jpg" loading="lazy"></div>
<div class="photo"><img src="Concerts/Simar(9).jpeg" loading="lazy"></div>
</div>
</div>

<!-- DANCE -->

<div id="dance" class="category-section">
<h2 class="section-title">Dance Photography</h2>
<div class="gallery">
<div class="photo"><img src="Dance/DSC05520.jpeg" loading="lazy"></div>
<div class="photo"><img src="Dance/DSC_2988.jpeg" loading="lazy"></div>
<div class="photo"><img src="Dance/DSC_4503.jpeg" loading="lazy"></div>
<div class="photo"><img src="Dance/DSC_5197.jpeg" loading="lazy"></div>
</div>
</div>

<!-- DJ -->

<div id="dj" class="category-section">
<h2 class="section-title">DJ Photography</h2>
<div class="gallery">
<div class="photo"><img src="DJ/IMG_5126.jpeg" loading="lazy"></div>
<div class="photo"><img src="DJ/NU_02768.jpeg" loading="lazy"></div>
</div>
</div>

<!-- PHOTOSHOOT -->

<div id="photoshoot" class="category-section">
<h2 class="section-title">Photoshoots</h2>
<div class="gallery">
<div class="photo"><img src="Photoshoot/IMG_9004.jpeg" loading="lazy"></div>
</div>
</div>

<!-- MUSIC -->

<div id="music" class="category-section">
<h2 class="section-title">Music Photography</h2>
<div class="gallery">
<div class="photo"><img src="Music/DSC_0008.jpeg" loading="lazy"></div>
</div>
</div>

<!-- SPORTS -->

<div id="sports" class="category-section">
<h2 class="section-title">Sports Photography</h2>
<div class="gallery">
<div class="photo"><img src="Sports/IMG_0315.jpeg" loading="lazy"></div>
</div>
</div>

</section>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeLightbox()">
<span class="close">&times;</span>
<img id="lightbox-img">
</div>

<script>
// FILTER
function showAll(){
  document.querySelectorAll('.category-section').forEach(sec=>sec.style.display='block');
}
function showOnly(id){
  document.querySelectorAll('.category-section').forEach(sec=>{
    sec.style.display = (sec.id===id) ? 'block' : 'none';
  });
}

// ANIMATION
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".photo img").forEach(img=>{
  observer.observe(img);
});

// LIGHTBOX
document.querySelectorAll('.photo img').forEach(img=>{
  img.addEventListener('click', ()=>{
    const lb = document.getElementById('lightbox');
    document.getElementById('lightbox-img').src = img.src;
    lb.style.display = 'flex';
    setTimeout(()=>lb.classList.add('show'),10);
  });
});

function closeLightbox(){
  const lb = document.getElementById('lightbox');
  lb.classList.remove('show');
  setTimeout(()=>lb.style.display='none',200);
}
</script>

</body>
</html>
